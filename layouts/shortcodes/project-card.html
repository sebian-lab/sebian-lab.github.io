<div class="project-card">
  <h3 style="margin-top: 0;"><a href="{{ .Get "link" }}" style="text-decoration: none;">{{ .Get "title" }}</a></h3>
  {{ if .Get "badge" }}
  <img src="{{ .Get "badge" }}" alt="Badge" style="margin-bottom: 10px;" />
  {{ end }}
  <p style="color: #c9d1d9;">{{ .Get "description" }}</p>
  <p style="margin-bottom: 0;"><small style="color: #8b949e;"><strong>Tags:</strong> {{ .Get "tags" }}</small></p>
</div>
